<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>動作テスト</title>
<style>
body{background:#0d111c;color:#fff;font-family:sans-serif;padding:20px;line-height:2}
.ok{color:#4ade80;font-weight:700}
.err{color:#ef4444;font-weight:700}
.loading{color:#f59e0b}
</style>
</head>
<body>
<h2>📋 ライブラリ読み込みテスト</h2>
<div id="js">✅ JavaScriptは動作しています</div>
<div id="react" class="loading">⏳ React 読み込み中…</div>
<div id="reactdom" class="loading">⏳ ReactDOM 読み込み中…</div>
<div id="recharts" class="loading">⏳ Recharts 読み込み中…</div>
<div id="result" style="margin-top:20px;font-size:18px"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.1.9/Recharts.js"></script>

<script>
window.addEventListener("load", function(){
  if(typeof React !== "undefined"){
    document.getElementById("react").className="ok";
    document.getElementById("react").textContent="✅ React: OK (v"+React.version+")";
  }else{
    document.getElementById("react").className="err";
    document.getElementById("react").textContent="❌ React: 読み込み失敗";
  }

  if(typeof ReactDOM !== "undefined"){
    document.getElementById("reactdom").className="ok";
    document.getElementById("reactdom").textContent="✅ ReactDOM: OK";
  }else{
    document.getElementById("reactdom").className="err";
    document.getElementById("reactdom").textContent="❌ ReactDOM: 読み込み失敗";
  }

  if(typeof Recharts !== "undefined"){
    document.getElementById("recharts").className="ok";
    document.getElementById("recharts").textContent="✅ Recharts: OK";
  }else{
    document.getElementById("recharts").className="err";
    document.getElementById("recharts").textContent="❌ Recharts: 読み込み失敗";
  }

  var allOk = typeof React!=="undefined" && typeof ReactDOM!=="undefined" && typeof Recharts!=="undefined";
  var res = document.getElementById("result");
  if(allOk){
    res.textContent="🎉 すべて正常です！家計簿アプリが動作する環境です。";
    res.style.color="#4ade80";
  }else{
    res.textContent="⚠️ 一部のライブラリが読み込めていません。ネットワーク環境を確認してください。";
    res.style.color="#ef4444";
  }
});
</script>
</body>
</html>
