// =====================================================================
// Google Drive ストレージ層
// =====================================================================
const GDrive = (() => {
  let _token = null;

  function setToken(t) { _token = t; }
  function getToken()  { return _token; }
  function clearToken(){ _token = null; }
  function isReady()   { return !!_token; }

  async function apiFetch(url, opts = {}) {
    const res = await fetch(url, {
      ...opts,
      headers: {
        Authorization: `Bearer ${_token}`,
        ...(opts.headers || {}),
      },
    });
    if (res.status === 401) { clearToken(); throw new Error("AUTH_EXPIRED"); }
    return res;
  }

  // ファイルIDを名前で検索
  async function findFileId(name) {
    const q = encodeURIComponent(`name='${name}' and trashed=false and 'appDataFolder' in parents`);
    const res = await apiFetch(
      `https://www.googleapis.com/drive/v3/files?q=${q}&spaces=appDataFolder&fields=files(id,name)`
    );
    const json = await res.json();
    return json.files?.[0]?.id ?? null;
  }

  // データ読み込み
  async function load() {
    if (!isReady()) return null;
    try {
      const id = await findFileId(CONFIG.DRIVE_FILE_NAME);
      if (!id) return null;
      const res = await apiFetch(
        `https://www.googleapis.com/drive/v3/files/${id}?alt=media`
      );
      return await res.json();
    } catch (e) {
      if (e.message === "AUTH_EXPIRED") throw e;
      return null;
    }
  }

  // データ保存（upsert）
  async function save(data) {
    if (!isReady()) return;
    const body = JSON.stringify(data);
    let id = await findFileId(CONFIG.DRIVE_FILE_NAME);

    if (id) {
      // 既存ファイルを更新
      await apiFetch(
        `https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=media`,
        { method: "PATCH", headers: { "Content-Type": "application/json" }, body }
      );
    } else {
      // 新規作成（appDataFolder = 非表示フォルダ、アプリ専用）
      const meta = JSON.stringify({ name: CONFIG.DRIVE_FILE_NAME, parents: ["appDataFolder"] });
      const form = new FormData();
      form.append("metadata", new Blob([meta], { type: "application/json" }));
      form.append("file",     new Blob([body], { type: "application/json" }));
      await apiFetch(
        "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",
        { method: "POST", body: form }
      );
    }
  }

  return { setToken, getToken, clearToken, isReady, load, save };
})();

// =====================================================================
// CSV エクスポート
// =====================================================================
function exportCSV(records, cashItems, invItems, transposed) {
  const sorted = [...records].sort((a,b)=>a.yearMonth.localeCompare(b.yearMonth));
  let rows = [];
  if (!transposed) {
    rows.push(["月",...cashItems.map(it=>it.name),"現金計",...invItems.map(it=>it.name),"投資計","総資産"]);
    sorted.forEach(rec => {
      const c=sumObj(rec.cash), i=sumObj(rec.inv);
      rows.push([ymLbl(rec.yearMonth),...cashItems.map(it=>Number(rec.cash?.[it.id]||0)),c,...invItems.map(it=>Number(rec.inv?.[it.id]||0)),i,c+i]);
    });
  } else {
    rows.push(["項目",...sorted.map(r=>ymLbl(r.yearMonth))]);
    cashItems.forEach(it=>rows.push([it.name,...sorted.map(r=>Number(r.cash?.[it.id]||0))]));
    rows.push(["現金計",...sorted.map(r=>sumObj(r.cash))]);
    invItems.forEach(it=>rows.push([it.name,...sorted.map(r=>Number(r.inv?.[it.id]||0))]));
    rows.push(["投資計",...sorted.map(r=>sumObj(r.inv))]);
    rows.push(["総資産",...sorted.map(r=>sumObj(r.cash)+sumObj(r.inv))]);
  }
  const csv="\uFEFF"+rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"}));
  a.download=`家計簿_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// =====================================================================
// CSV インポート
// =====================================================================
function parseImportCSV(text, currentCashItems, currentInvItems) {
  const clean = text.replace(/^\uFEFF/,"").replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  const lines = clean.split("\n").filter(l=>l.trim()!=="");
  if (lines.length<2) throw new Error("データ行がありません");

  function parseLine(line) {
    const cols=[]; let cur="",inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){ if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ; }
      else if(ch===','&&!inQ){cols.push(cur.trim());cur="";}
      else cur+=ch;
    }
    cols.push(cur.trim()); return cols;
  }

  const header=parseLine(lines[0]);
  const colNames=header.slice(1);
  const cashColIdxs=[], invColIdxs=[];
  let phase="cash";
  colNames.forEach((name,i)=>{
    if(name==="現金計"){phase="inv";return;}
    if(name==="投資計"||name==="総資産"){phase="done";return;}
    if(phase==="cash") cashColIdxs.push({name,colIdx:i});
    if(phase==="inv")  invColIdxs.push({name,colIdx:i});
  });
  if(cashColIdxs.length===0&&invColIdxs.length===0)
    throw new Error("項目列が見つかりません。月→行形式のCSVを使用してください。");

  function matchItems(csvCols, existing) {
    return csvCols.map(col=>{
      const ex=existing.find(it=>it.name===col.name);
      return ex ? ex : {id:"imp_"+Math.random().toString(36).slice(2,7),name:col.name};
    });
  }
  const newCashItems=matchItems(cashColIdxs, currentCashItems);
  const newInvItems =matchItems(invColIdxs,  currentInvItems);

  function labelToYM(label){
    const m=label.match(/(\d{4})年(\d{1,2})月/);
    if(!m) return null;
    return `${m[1]}-${String(m[2]).padStart(2,"0")}`;
  }

  const records=[];
  for(let li=1;li<lines.length;li++){
    const cols=parseLine(lines[li]);
    if(cols.length<2) continue;
    const ym=labelToYM(cols[0]);
    if(!ym) continue;
    const cash={}, inv={};
    newCashItems.forEach((it,i)=>{ cash[it.id]=Number(String(cols[cashColIdxs[i].colIdx+1]).replace(/[,¥]/g,""))||0; });
    newInvItems.forEach((it,i)=>{ inv[it.id]=Number(String(cols[invColIdxs[i].colIdx+1]).replace(/[,¥]/g,""))||0; });
    records.push({id:"imp_"+uid(),yearMonth:ym,cash,inv});
  }
  if(records.length===0) throw new Error("読み込めるレコードがありませんでした");
  return {newCashItems,newInvItems,records};
}

// =====================================================================
// ソート＆編集可能 Item Manager
// =====================================================================
function SortableItemManager({title,items,color,onAdd,onRemove,onReorder,onRename}) {
  const [newName,setNewName]=useState("");
  const [dragging,setDragging]=useState(null);
  const [dragOver,setDragOver]=useState(null);
  const [editingId,setEditingId]=useState(null);
  const [editName,setEditName]=useState("");
  const dragIdx=useRef(null);

  function handleDragStart(i){setDragging(i);dragIdx.current=i;}
  function handleDragEnter(i){setDragOver(i);}
  function handleDragEnd(){
    if(dragIdx.current!==null&&dragOver!==null&&dragIdx.current!==dragOver) onReorder(dragIdx.current,dragOver);
    setDragging(null);setDragOver(null);dragIdx.current=null;
  }
  function startEdit(it){setEditingId(it.id);setEditName(it.name);}
  function commitEdit(id){if(editName.trim())onRename(id,editName.trim());setEditingId(null);}

  return (
    <div style={{marginBottom:4}}>
      <div style={{color,fontWeight:700,fontSize:12,letterSpacing:2,marginBottom:10}}>{title}</div>
      <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:10}}>
        {items.map((it,i)=>(
          <div key={it.id} draggable={editingId!==it.id}
            onDragStart={()=>editingId!==it.id&&handleDragStart(i)}
            onDragEnter={()=>handleDragEnter(i)} onDragEnd={handleDragEnd}
            onDragOver={e=>e.preventDefault()}
            style={{display:"flex",alignItems:"center",gap:7,background:dragOver===i?color+"28":color+"12",border:`1px solid ${dragging===i?color+"88":color+"33"}`,borderRadius:10,padding:"7px 10px",opacity:dragging===i?0.45:1,transition:"background .15s",cursor:editingId===it.id?"default":"grab"}}>
            <span style={{color:color+"66",fontSize:14,userSelect:"none",flexShrink:0}}>⠿</span>
            {editingId===it.id
              ? <input autoFocus value={editName} onChange={e=>setEditName(e.target.value)}
                  onKeyDown={e=>{if(e.key==="Enter")commitEdit(it.id);if(e.key==="Escape")setEditingId(null);}}
                  style={{flex:1,background:"rgba(255,255,255,0.1)",border:`1px solid ${color}88`,borderRadius:6,padding:"3px 8px",color:"#fff",fontSize:13,outline:"none"}}/>
              : <span style={{flex:1,fontSize:13}}>{it.name}</span>
            }
            {editingId===it.id
              ? <button onClick={()=>commitEdit(it.id)} style={{background:color+"44",border:`1px solid ${color}88`,color:"#fff",borderRadius:6,padding:"2px 8px",cursor:"pointer",fontSize:11,fontWeight:700}}>確定</button>
              : <button onClick={()=>startEdit(it)} style={{background:"none",border:"none",color:color+"88",cursor:"pointer",fontSize:12,padding:"0 2px"}}>✏️</button>
            }
            <button onClick={()=>i>0&&onReorder(i,i-1)} disabled={i===0} style={{background:"none",border:"none",color:i===0?"rgba(255,255,255,0.15)":color+"aa",cursor:i===0?"default":"pointer",fontSize:13,padding:"0 2px"}}>▲</button>
            <button onClick={()=>i<items.length-1&&onReorder(i,i+1)} disabled={i===items.length-1} style={{background:"none",border:"none",color:i===items.length-1?"rgba(255,255,255,0.15)":color+"aa",cursor:i===items.length-1?"default":"pointer",fontSize:13,padding:"0 2px"}}>▼</button>
            <button onClick={()=>onRemove(it.id)} style={{background:"none",border:"none",color:color+"77",cursor:"pointer",fontSize:16,lineHeight:1,padding:"0 2px"}}>×</button>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:6}}>
        <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="新しい項目名"
          onKeyDown={e=>{if(e.key==="Enter"&&newName.trim()){onAdd(newName.trim());setNewName("");}}}
          style={{flex:1,background:"rgba(255,255,255,0.07)",border:`1px solid ${color}44`,borderRadius:8,padding:"6px 10px",color:"#fff",fontSize:13,outline:"none"}}/>
        <button onClick={()=>{if(newName.trim()){onAdd(newName.trim());setNewName("");}}}
          style={{background:color+"33",border:`1px solid ${color}66`,color,borderRadius:8,padding:"6px 14px",cursor:"pointer",fontWeight:700,fontSize:13}}>+ 追加</button>
      </div>
    </div>
  );
}

                </tr>
              )),
              <tr key={`gt-${gi}`} style={{background:grp.color+"0d"}}>
                <td style={{...cb("left"),...sL,color:grp.color,fontWeight:700,fontSize:11,zIndex:1,background:grp.color+"15"}}>{grp.label==="現金・預金"?"現金計":"投資計"}</td>
                {sorted.map(r=><Td key={r.id} val={sumObj(r[grp.type])} color={grp.color} bold/>)}
              </tr>,
            ];
          })}
          <tr style={{background:TC+"15"}}>
            <td style={{...cb("left"),...sL,color:TC,fontWeight:800,fontSize:11,zIndex:1,background:TC+"20"}}>総資産</td>
            {sorted.map(r=><td key={r.id} style={{...cb(),color:TC,fontWeight:800,borderLeft:"1px solid rgba(255,255,255,0.08)"}}>¥{fmt(sumObj(r.cash)+sumObj(r.inv))}</td>)}
          </tr>
        </tbody>
      </table>
    );
  };

  return (
    <div>
      <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center",flexWrap:"wrap"}}>
        <button onClick={()=>setTransposed(false)} style={{padding:"6px 14px",borderRadius:8,border:`1px solid ${!transposed?"rgba(255,255,255,0.4)":"rgba(255,255,255,0.15)"}`,background:!transposed?"rgba(255,255,255,0.12)":"transparent",color:!transposed?"#fff":"rgba(255,255,255,0.45)",cursor:"pointer",fontSize:12,fontWeight:!transposed?700:400}}>月 → 行</button>
        <button onClick={()=>setTransposed(true)}  style={{padding:"6px 14px",borderRadius:8,border:`1px solid ${transposed?"rgba(255,255,255,0.4)":"rgba(255,255,255,0.15)"}`,background:transposed?"rgba(255,255,255,0.12)":"transparent",color:transposed?"#fff":"rgba(255,255,255,0.45)",cursor:"pointer",fontSize:12,fontWeight:transposed?700:400}}>項目 → 行</button>
        <button onClick={()=>exportCSV(records,cashItems,invItems,transposed)} style={{marginLeft:"auto",padding:"6px 16px",borderRadius:8,border:"1px solid rgba(250,204,21,0.5)",background:"rgba(250,204,21,0.12)",color:"#facc15",cursor:"pointer",fontSize:12,fontWeight:700}}>↓ CSV出力</button>
      </div>
      <div style={{fontSize:10,color:"rgba(255,255,255,0.25)",marginBottom:8}}>← 横スクロール可</div>
      <div style={{overflowX:"auto",borderRadius:12,border:"1px solid rgba(255,255,255,0.09)"}}>
        {transposed?<TransposedTable/>:<NormalTable/>}
      </div>
    </div>
  );
}

// =====================================================================
// Google Drive 同期ステータスバー
// =====================================================================
function SyncBar({status, user, onLogin, onLogout, onSync}) {
  const colors = {
    idle:    {bg:"rgba(255,255,255,0.05)", txt:"rgba(255,255,255,0.4)", dot:"rgba(255,255,255,0.3)"},
    syncing: {bg:"rgba(96,165,250,0.1)",  txt:"#60a5fa",               dot:"#60a5fa"},
    ok:      {bg:"rgba(74,222,128,0.1)",  txt:"#4ade80",               dot:"#4ade80"},
    error:   {bg:"rgba(239,68,68,0.1)",   txt:"#ef4444",               dot:"#ef4444"},
    offline: {bg:"rgba(245,158,11,0.1)",  txt:"#f59e0b",               dot:"#f59e0b"},
  };
  const c = colors[status] || colors.idle;
  const labels = {
    idle:"未接続", syncing:"同期中…", ok:"同期済み", error:"同期エラー", offline:"オフライン（ローカル保存）"
  };

  return (
    <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 18px",background:c.bg,borderBottom:"1px solid rgba(255,255,255,0.07)",flexWrap:"wrap"}}>
      <div style={{width:7,height:7,borderRadius:"50%",background:c.dot,flexShrink:0}}/>
      <span style={{fontSize:11,color:c.txt,flex:1}}>{labels[status]}{user ? ` · ${user}` : ""}</span>
      {status==="ok"||status==="syncing" ? (
        <>
          <button onClick={onSync} style={{background:"none",border:"1px solid rgba(255,255,255,0.2)",borderRadius:6,color:"rgba(255,255,255,0.5)",fontSize:10,padding:"2px 8px",cursor:"pointer"}}>手動同期</button>
          <button onClick={onLogout} style={{background:"none",border:"none",color:"rgba(255,255,255,0.3)",fontSize:10,cursor:"pointer"}}>ログアウト</button>
        </>
      ) : status==="idle" ? (
        <button onClick={onLogin} style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:6,color:"#fff",fontSize:11,padding:"3px 10px",cursor:"pointer",fontWeight:600}}>Googleでログイン</button>
      ) : status==="error" ? (
        <button onClick={onLogin} style={{background:"rgba(239,68,68,0.2)",border:"1px solid rgba(239,68,68,0.4)",borderRadius:6,color:"#ef4444",fontSize:11,padding:"3px 10px",cursor:"pointer"}}>再接続</button>
      ) : null}
    </div>
  );
}

// =====================================================================
// メインアプリ
// =====================================================================
function App() {
  const [appData,  setAppData]  = useState(null);
  const [tab,      setTab]      = useState("dashboard");
  const [inputYM,  setInputYM]  = useState(ymStr(today.getFullYear(), today.getMonth()+1));
  const [inputCash,setInputCash]= useState({});
  const [inputInv, setInputInv] = useState({});
  const [saved,    setSaved]    = useState(false);

  // Google Drive 同期状態
  const [syncStatus, setSyncStatus] = useState("idle"); // idle|syncing|ok|error|offline
  const [gUser,      setGUser]      = useState(null);
  const syncTimer = useRef(null);

  // ── Google Identity Services 初期化 ────────────────────────────────
  useEffect(() => {
    if (!window.google || CONFIG.CLIENT_ID === "1007666474002-6mph9u8k4h834u12tnmsu4ltrtlmm5lr.apps.googleusercontent.com") {
      // CLIENT_ID 未設定 → ローカルのみモード
      setSyncStatus("offline");
      const local = localLoad();
      setAppData(local || DEFAULT_STATE);
      return;
    }

    // GIS トークンクライアント
    const tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CONFIG.CLIENT_ID,
      scope: "https://www.googleapis.com/auth/drive.appdata",
      callback: async (resp) => {
        if (resp.error) { setSyncStatus("error"); return; }
        GDrive.setToken(resp.access_token);
        setSyncStatus("syncing");
        try {
          const remote = await GDrive.load();
          const local  = localLoad();
          // リモート優先、なければローカル、なければデフォルト
          const data = remote || local || DEFAULT_STATE;
          setAppData(data);
          localSave(data);
          if (!remote) await GDrive.save(data); // 初回はアップロード
          setSyncStatus("ok");
        } catch {
          setSyncStatus("error");
        }
      },
    });

    window._gTokenClient = tokenClient;

    // ページロード時に保存済みトークンがあれば自動ログイン試行
    const local = localLoad();
    if (local) setAppData(local); // まずローカルで表示
    else setAppData(DEFAULT_STATE);
  }, []);

  // ── ログイン / ログアウト ──────────────────────────────────────────
  function handleLogin() {
    if (window._gTokenClient) {
      window._gTokenClient.requestAccessToken({ prompt: "" });
    }
  }
  function handleLogout() {
    if (GDrive.getToken()) google.accounts.oauth2.revoke(GDrive.getToken(), ()=>{});
    GDrive.clearToken();
    setSyncStatus("idle");
    setGUser(null);
  }

  // ── 手動同期 ──────────────────────────────────────────────────────
  async function handleSync() {
    if (!GDrive.isReady()) return;
    setSyncStatus("syncing");
    try {
      const remote = await GDrive.load();
      if (remote) { setAppData(remote); localSave(remote); }
      setSyncStatus("ok");
    } catch { setSyncStatus("error"); }
  }

  // ── データ変更時に保存 ─────────────────────────────────────────────
  const mutate = useCallback((fn) => {
    setAppData(prev => {
      const next = fn(deepCopy(prev));
      localSave(next); // 即時ローカル保存
      // Driveへは 1 秒デバウンス
      if (syncTimer.current) clearTimeout(syncTimer.current);
      syncTimer.current = setTimeout(async () => {
        if (!GDrive.isReady()) return;
        setSyncStatus("syncing");
        try { await GDrive.save(next); setSyncStatus("ok"); }
        catch { setSyncStatus("error"); }
      }, 1000);
      return next;
    });
  }, []);

  // ── 月切替で前月データ引き継ぎ ────────────────────────────────────
  useEffect(() => {
    if (!appData) return;
    const rec = appData.records.find(r => r.yearMonth===inputYM);
    if (rec) {
      setInputCash({...rec.cash}); setInputInv({...rec.inv});
    } else {
      const sorted=[...appData.records].sort((a,b)=>a.yearMonth.localeCompare(b.yearMonth));
      const prev=sorted.filter(r=>r.yearMonth<inputYM).pop();
      if (prev) { setInputCash({...prev.cash}); setInputInv({...prev.inv}); }
      else      { setInputCash({}); setInputInv({}); }
    }
  }, [inputYM, appData]);

  if (!appData) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:"#fff",fontSize:14}}>読み込み中…</div>
  );

  const {cashItems,invItems,records} = appData;
  const sorted=[...records].sort((a,b)=>a.yearMonth.localeCompare(b.yearMonth));
  const latest=sorted[sorted.length-1];
  const lCash=latest?sumObj(latest.cash):0, lInv=latest?sumObj(latest.inv):0, lTotal=lCash+lInv;
  const cRatio=lTotal>0?((lCash/lTotal)*100).toFixed(1):"0.0";
  const iRatio=lTotal>0?((lInv /lTotal)*100).toFixed(1):"0.0";
  const chartData=sorted.map(r=>({ym:r.yearMonth,現金:sumObj(r.cash),投資:sumObj(r.inv),総資産:sumObj(r.cash)+sumObj(r.inv)}));
  const cashPie=cashItems.map((it,i)=>({name:it.name,value:Number(latest?.cash?.[it.id]||0),color:PIE[i%PIE.length]})).filter(d=>d.value>0);
  const invPie =invItems.map ((it,i)=>({name:it.name,value:Number(latest?.inv ?.[it.id]||0),color:PIE[(i+5)%PIE.length]})).filter(d=>d.value>0);

  function handleSave() {
    const ym=inputYM,cs={...inputCash},iv={...inputInv};
    mutate(d=>{
      const idx=d.records.findIndex(r=>r.yearMonth===ym);
      const rec={id:idx>=0?d.records[idx].id:uid(),yearMonth:ym,cash:cs,inv:iv};
      if(idx>=0) d.records[idx]=rec; else d.records.push(rec);
      return d;
    });
    setSaved(true); setTimeout(()=>setSaved(false),2000);
  }

  function handleDelete(id) {
    if(!window.confirm("この月のデータを削除しますか？")) return;
    mutate(d=>{d.records=d.records.filter(r=>r.id!==id);return d;});
  }

  function reorderItems(key,fromIdx,toIdx) {
    mutate(d=>{const arr=[...d[key]];const [item]=arr.splice(fromIdx,1);arr.splice(toIdx,0,item);d[key]=arr;return d;});
  }
  function renameItem(key,id,name) {
    mutate(d=>{const it=d[key].find(x=>x.id===id);if(it)it.name=name;return d;});
  }

  const TABS=[
    {key:"dashboard",label:"ダッシュボード"},
    {key:"input",    label:"データ入力"},
    {key:"sheet",    label:"一覧シート"},
    {key:"history",  label:"履歴"},
    {key:"settings", label:"設定"},
  ];

  return (
    <div style={{minHeight:"100vh",paddingBottom:60}}>
      {/* ヘッダー */}
      <div style={{padding:"22px 18px 14px",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
        <div style={{display:"flex",alignItems:"baseline",gap:10}}>
          <span style={{fontSize:22,fontWeight:800,letterSpacing:-0.5}}>家計簿</span>
          <Tag color={TC} label="KAKEIBO"/>
        </div>
        <div style={{color:"rgba(255,255,255,0.35)",fontSize:11,marginTop:2}}>資産管理ダッシュボード</div>
      </div>

      {/* 同期ステータスバー */}
      <SyncBar status={syncStatus} user={gUser} onLogin={handleLogin} onLogout={handleLogout} onSync={handleSync}/>

      <div style={{padding:"14px 14px 0"}}>
        {/* タブバー */}
        <div style={{display:"flex",gap:3,background:"rgba(255,255,255,0.05)",borderRadius:12,padding:4,marginBottom:20}}>
          {TABS.map(t=>(
            <button key={t.key} onClick={()=>setTab(t.key)}
              style={{flex:1,padding:"7px 2px",borderRadius:9,border:"none",cursor:"pointer",fontWeight:tab===t.key?700:500,fontSize:11,background:tab===t.key?"rgba(255,255,255,0.12)":"transparent",color:tab===t.key?"#fff":"rgba(255,255,255,0.4)",transition:"all .2s"}}>
              {t.label}
            </button>
          ))}
        </div>

        {/* ══ DASHBOARD ══ */}
        {tab==="dashboard" && (
          <div>
            <Card style={{marginBottom:12}}>
              {latest&&<div style={{color:"rgba(255,255,255,0.35)",fontSize:10,marginBottom:10,textAlign:"center"}}>{ymLbl(latest.yearMonth)} 時点</div>}
              <div style={{display:"flex",gap:10}}>
                {[{l:"総資産",v:lTotal,c:TC},{l:"現金",v:lCash,c:CC,sub:`${cRatio}%`},{l:"投資",v:lInv,c:IC,sub:`${iRatio}%`}].map((x,i)=>(
                  <div key={i} style={{flex:1,textAlign:"center"}}>
                    <div style={{color:"rgba(255,255,255,0.4)",fontSize:10,letterSpacing:1,marginBottom:4}}>{x.l}</div>
                    <div style={{color:x.c,fontSize:20,fontWeight:800,fontFamily:"monospace",lineHeight:1}}>¥{fmt(x.v)}</div>
                    {x.sub&&<div style={{color:"rgba(255,255,255,0.3)",fontSize:10,marginTop:3}}>{x.sub}</div>}
                  </div>
                ))}
              </div>
            </Card>

            {lTotal>0&&(
              <Card style={{marginBottom:12}}>
                <div style={lbl()}>現金 / 投資 比率</div>
                <div style={{display:"flex",borderRadius:6,overflow:"hidden",height:18}}>
                  <div style={{width:`${cRatio}%`,background:CC,transition:"width .6s"}}/>
                  <div style={{width:`${iRatio}%`,background:IC,transition:"width .6s"}}/>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:11}}>
                  <span style={{color:CC}}>現金 {cRatio}%</span>
                  <span style={{color:IC}}>投資 {iRatio}%</span>
                </div>
              </Card>
            )}

            {chartData.length>0&&(
              <Card style={{marginBottom:12}}>
                <div style={lbl()}>月別推移</div>
                <ResponsiveContainer width="100%" height={190}>
                  <AreaChart data={chartData}>
                    <defs>
                      {[["gc",CC],["gi",IC],["gt",TC]].map(([id,c])=>(
                        <linearGradient key={id} id={id} x1="0" y1="0" x2="0" y2="1">
                          <stop offset="5%"  stopColor={c} stopOpacity={0.28}/>
                          <stop offset="95%" stopColor={c} stopOpacity={0}/>
                        </linearGradient>
                      ))}
                    </defs>
                    <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)"/>
                    <XAxis dataKey="ym" tickFormatter={s=>{const[y,m]=s.split("-");return`${y.slice(2)}/${Number(m)}`;}} tick={{fill:"rgba(255,255,255,0.35)",fontSize:9}} axisLine={false} tickLine={false}/>
                    <YAxis tickFormatter={v=>`${(v/10000).toFixed(0)}万`} tick={{fill:"rgba(255,255,255,0.35)",fontSize:9}} axisLine={false} tickLine={false} width={38}/>
                    <Tooltip content={<ChartTooltip/>}/>
                    <Legend wrapperStyle={{fontSize:10,color:"rgba(255,255,255,0.45)"}}/>
                    <Area type="monotone" dataKey="総資産" stroke={TC} fill="url(#gt)" strokeWidth={2} dot={false}/>
                    <Area type="monotone" dataKey="現金"   stroke={CC} fill="url(#gc)" strokeWidth={1.5} dot={false}/>
                    <Area type="monotone" dataKey="投資"   stroke={IC} fill="url(#gi)" strokeWidth={1.5} dot={false}/>
                  </AreaChart>
                </ResponsiveContainer>
              </Card>
            )}

            {(cashPie.length>0||invPie.length>0)&&(
              <div style={{display:"flex",gap:10}}>
                {[{pie:cashPie,label:"現金内訳",color:CC},{pie:invPie,label:"投資内訳",color:IC}].map(({pie,label,color})=>
                  pie.length>0&&(
                    <Card key={label} style={{flex:1}}>
                      <div style={{...lbl(color),textAlign:"center"}}>{label}</div>
                      <ResponsiveContainer width="100%" height={120}>
                        <PieChart>
                          <Pie data={pie} cx="50%" cy="50%" innerRadius={28} outerRadius={48} paddingAngle={2} dataKey="value">
                            {pie.map((d,i)=><Cell key={i} fill={d.color}/>)}
                          </Pie>
                          <Tooltip formatter={v=>`¥${fmt(v)}`} contentStyle={{background:"#1a1f2e",border:"1px solid rgba(255,255,255,0.15)",borderRadius:8,fontSize:10}}/>
                        </PieChart>
                      </ResponsiveContainer>
                      {pie.map((d,i)=>(
                        <div key={i} style={{display:"flex",alignItems:"center",gap:4,marginBottom:2}}>
                          <div style={{width:7,height:7,borderRadius:2,background:d.color,flexShrink:0}}/>
                          <span style={{flex:1,fontSize:10,color:"rgba(255,255,255,0.5)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.name}</span>
                          <span style={{fontSize:10,fontFamily:"monospace"}}>¥{fmt(d.value)}</span>
                        </div>
                      ))}
                    </Card>
                  )
                )}
              </div>
            )}

            {records.length===0&&(
              <div style={{textAlign:"center",padding:"50px 20px",color:"rgba(255,255,255,0.3)",fontSize:13}}>
                まだデータがありません。<br/>「データ入力」から月末残高を入力してください。
              </div>
            )}
          </div>
        )}

        {/* ══ INPUT ══ */}
        {tab==="input"&&(
          <div>
            <Card style={{marginBottom:12}}>
              <div style={lbl()}>入力月</div>
              <input type="month" value={inputYM} onChange={e=>setInputYM(e.target.value)}
                style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:8,padding:"8px 12px",color:"#fff",fontSize:15,fontWeight:700,outline:"none",width:"100%"}}/>
              <div style={{marginTop:8,fontSize:10,color:"rgba(255,255,255,0.3)"}}>※ 新しい月を選ぶと直前月の値が自動引き継ぎされます</div>
            </Card>

            {[
              {label:"現金・預金",tag:"CASH",color:CC,items:cashItems,vals:inputCash,setVals:setInputCash},
              {label:"投資",      tag:"INV", color:IC,items:invItems, vals:inputInv, setVals:setInputInv},
            ].map(({label,tag,color,items,vals,setVals})=>(
              <Card key={tag} style={{marginBottom:12}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                  <Tag color={color} label={tag}/>
                  <span style={{fontSize:13,fontWeight:700}}>{label}</span>
                  <span style={{marginLeft:"auto",color,fontWeight:800,fontSize:13,fontFamily:"monospace"}}>¥{fmt(sumObj(vals))}</span>
                </div>
                {items.map(it=>(
                  <div key={it.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:9}}>
                    <label style={{flex:1,fontSize:13,color:"rgba(255,255,255,0.65)"}}>{it.name}</label>
                    <input type="number" min="0" value={vals[it.id]||""} placeholder="0"
                      onChange={e=>setVals(p=>({...p,[it.id]:e.target.value}))}
                      style={{width:120,background:"rgba(255,255,255,0.07)",border:`1px solid ${color}33`,borderRadius:8,padding:"6px 10px",color:"#fff",fontSize:13,textAlign:"right",outline:"none",fontFamily:"monospace"}}/>
                  </div>
                ))}
              </Card>
            ))}

            <Card style={{marginBottom:14,textAlign:"center",border:`1px solid ${TC}33`}}>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.35)",letterSpacing:2,marginBottom:4}}>今月の総資産</div>
              <div style={{fontSize:28,fontWeight:800,color:TC,fontFamily:"monospace"}}>¥{fmt(sumObj(inputCash)+sumObj(inputInv))}</div>
            </Card>
            <button onClick={handleSave}
              style={{width:"100%",padding:14,borderRadius:12,border:"none",cursor:"pointer",background:saved?"#22c55e":"linear-gradient(90deg,#3b82f6,#6366f1)",color:"#fff",fontWeight:800,fontSize:15,letterSpacing:1,transition:"all .3s"}}>
              {saved?"✓ 保存しました":"保存する"}
            </button>
          </div>
        )}

        {/* ══ SHEET ══ */}
        {tab==="sheet"&&<SheetTab records={records} cashItems={cashItems} invItems={invItems}/>}

        {/* ══ HISTORY ══ */}
        {tab==="history"&&(
          <div>
            {sorted.length===0&&<div style={{textAlign:"center",padding:"50px",color:"rgba(255,255,255,0.3)",fontSize:13}}>履歴がありません</div>}
            {[...sorted].reverse().map(rec=>{
              const c=sumObj(rec.cash),i=sumObj(rec.inv),t=c+i;
              const cr=t>0?((c/t)*100).toFixed(0):0,ir=t>0?((i/t)*100).toFixed(0):0;
              return (
                <Card key={rec.id} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <div style={{fontWeight:700,fontSize:14}}>{ymLbl(rec.yearMonth)}</div>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={()=>{setTab("input");setInputYM(rec.yearMonth);}}
                        style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.18)",borderRadius:7,padding:"3px 10px",color:"#fff",cursor:"pointer",fontSize:11}}>編集</button>
                      <button onClick={()=>handleDelete(rec.id)}
                        style={{background:"rgba(239,68,68,0.13)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:7,padding:"3px 10px",color:"#ef4444",cursor:"pointer",fontSize:11}}>削除</button>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:10,marginBottom:8}}>
                    {[{l:`現金 ${cr}%`,v:c,c:CC},{l:`投資 ${ir}%`,v:i,c:IC},{l:"総資産",v:t,c:TC}].map((x,idx)=>(
                      <div key={idx} style={{flex:1,textAlign:"center"}}>
                        <div style={{fontSize:10,color:x.c,marginBottom:2}}>{x.l}</div>
                        <div style={{fontFamily:"monospace",fontWeight:700,fontSize:12}}>¥{fmt(x.v)}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{display:"flex",borderRadius:4,overflow:"hidden",height:5}}>
                    <div style={{width:`${cr}%`,background:CC}}/><div style={{width:`${ir}%`,background:IC}}/>
                  </div>
                </Card>
              );
            })}
          </div>
        )}

        {/* ══ SETTINGS ══ */}
        {tab==="settings"&&(
          <div>
            <Card style={{marginBottom:12}}>
              <div style={lbl()}>項目管理 · 並び順 · 名前編集</div>
              <p style={{color:"rgba(255,255,255,0.35)",fontSize:11,marginTop:0,marginBottom:14}}>✏️ で名前編集 / ⠿ ドラッグ or ▲▼ で並び替え</p>
              <SortableItemManager title="現金・預金カテゴリ" items={cashItems} color={CC}
                onAdd={name=>mutate(d=>{d.cashItems.push({id:uid(),name});return d;})}
                onRemove={id=>{if(cashItems.length<=1)return alert("最低1項目必要です");mutate(d=>{d.cashItems=d.cashItems.filter(it=>it.id!==id);return d;});}}
                onReorder={(f,t)=>reorderItems("cashItems",f,t)}
                onRename={(id,name)=>renameItem("cashItems",id,name)}/>
              <Divider/>
              <SortableItemManager title="投資カテゴリ" items={invItems} color={IC}
                onAdd={name=>mutate(d=>{d.invItems.push({id:uid(),name});return d;})}
                onRemove={id=>{if(invItems.length<=1)return alert("最低1項目必要です");mutate(d=>{d.invItems=d.invItems.filter(it=>it.id!==id);return d;});}}
                onReorder={(f,t)=>reorderItems("invItems",f,t)}
                onRename={(id,name)=>renameItem("invItems",id,name)}/>
            </Card>

            <Card>
              <div style={lbl()}>データ管理</div>

              {/* CSVインポート */}
              <div style={{marginBottom:14}}>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.5)",marginBottom:6}}>CSVインポート</div>
                <p style={{fontSize:10,color:"rgba(255,255,255,0.3)",margin:"0 0 10px"}}>月→行形式のCSVを読み込みます。重複月は上書きされます。</p>
                <label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,width:"100%",padding:"10px",borderRadius:10,border:"1px solid rgba(96,165,250,0.4)",background:"rgba(96,165,250,0.1)",color:"#60a5fa",cursor:"pointer",fontWeight:700,fontSize:13}}>
                  ↑ CSVファイルを選択
                  <input type="file" accept=".csv,text/csv" style={{display:"none"}}
                    onChange={e=>{
                      const file=e.target.files?.[0];
                      if(!file) return;
                      const reader=new FileReader();
                      reader.onload=ev=>{
                        try {
                          const {newCashItems,newInvItems,records:imp}=parseImportCSV(ev.target.result,cashItems,invItems);
                          if(!window.confirm(`${imp.length}件を読み込みます。統合してよいですか？`)) return;
                          mutate(d=>{
                            newCashItems.forEach(it=>{if(!d.cashItems.find(x=>x.id===it.id))d.cashItems.push(it);});
                            newInvItems.forEach(it=>{if(!d.invItems.find(x=>x.id===it.id))d.invItems.push(it);});
                            imp.forEach(rec=>{const idx=d.records.findIndex(r=>r.yearMonth===rec.yearMonth);if(idx>=0)d.records[idx]=rec;else d.records.push(rec);});
                            return d;
                          });
                          alert(`✅ ${imp.length}件を取り込みました`);
                        } catch(err){alert("エラー："+err.message);}
                        e.target.value="";
                      };
                      reader.readAsText(file,"UTF-8");
                    }}/>
                </label>
              </div>

              <Divider/>

              <button onClick={()=>{if(!window.confirm("全データを初期化しますか？"))return;mutate(()=>deepCopy(DEFAULT_STATE));}}
                style={{width:"100%",padding:10,borderRadius:10,border:"1px solid rgba(239,68,68,0.4)",background:"rgba(239,68,68,0.1)",color:"#ef4444",cursor:"pointer",fontWeight:700,fontSize:13}}>
                全データを初期化する
              </button>
            </Card>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
